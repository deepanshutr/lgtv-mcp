version: 2
project_name: lgtv-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: lgtv-mcp
    main: ./cmd/lgtv-mcp
    binary: lgtv-mcp
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
